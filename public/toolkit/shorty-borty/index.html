<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shorty-Borty | Chuffed Toolkit</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Shared Styles -->
    <link rel="stylesheet" href="../../reset.css" />
    <link rel="stylesheet" href="../../colour.css" />
    <link rel="stylesheet" href="../../typography.css" />
    <link rel="stylesheet" href="../../layout.css" />
    <link rel="stylesheet" href="../../call-to-action.css" />

    <style>
      .preview-container {
        width: 100%;
        max-width: 400px;
        margin: 0 auto 24px;
        border: 1px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
        background-color: var(--surface);
      }

      .preview-container img {
        width: 100%;
        display: block;
        filter: none !important;
      }

      .export-row {
        width: 100%;
        padding: 12px;
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .export-row .value {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: var(--primary-text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .code-block {
        width: 100%;
        padding: 16px;
        background-color: var(--background);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: var(--secondary-text);
        white-space: pre-wrap;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <section>
      <div class="container" style="max-width: 600px; margin: 0 auto;">
        <header style="text-align: center; margin-bottom: 64px;">
          <h1>Shorty-Borty<span class="text-accent">.</span></h1>
          <p class="lead-text">Create HTML image links from YouTube videos.</p>
        </header>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-marker"></div>
            <span class="label">INPUT URL</span>
          </div>
          <div class="panel-content">
            <input id="video-url" type="text" placeholder="Paste YouTube Short or Video URL" style="width: 100%">
          </div>
        </div>

        <div id="results-area" class="hidden" style="margin-top: 48px;">
          <div class="panel">
            <div class="panel-header">
              <div class="panel-marker"></div>
              <span class="label">VISUAL PREVIEW</span>
            </div>
            <div class="panel-content" style="align-items: center;">
              <div class="preview-container">
                <img id="preview-img" src="" alt="Thumbnail Preview">
              </div>
              
              <div style="width: 100%;">
                <span class="label" style="display: block; margin-bottom: 8px;">EXPORT LINKS</span>
                <div class="export-row">
                    <div style="overflow: hidden;">
                        <span class="label">STANDARD</span>
                        <div id="link-standard" class="value"></div>
                    </div>
                    <button onclick="copyText('link-standard')" class="read-more-btn" style="margin: 0">COPY</button>
                </div>
                <div class="export-row">
                    <div style="overflow: hidden;">
                        <span class="label">SHORTS</span>
                        <div id="link-shorts" class="value"></div>
                    </div>
                    <button onclick="copyText('link-shorts')" class="read-more-btn" style="margin: 0">COPY</button>
                </div>
              </div>

              <div style="width: 100%; margin-top: 24px;">
                <span class="label" style="display: block; margin-bottom: 8px;">HTML EMBED</span>
                <div id="embed-code" class="code-block"></div>
                <button onclick="copyText('embed-code')" class="cta-button" style="width: 100%; margin-top: 16px;">COPY EMBED CODE</button>
              </div>
            </div>
          </div>
        </div>

        <div id="empty-state" style="text-align: center; margin-top: 48px; border: 1px dashed var(--border); padding: 48px; border-radius: 4px;">
          <p class="label">PASTE A URL TO BEGIN</p>
        </div>

        <footer style="text-align: center; border: none; padding-top: 96px;">
          <a href="../" class="label" style="color: var(--primary-text); text-decoration: none;">
            ← Back to Toolkit
          </a>
        </footer>
      </div>
    </section>

    <div id="copy-toast" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background-color: var(--highlight); color: var(--background); padding: 8px 16px; border-radius: 2px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;">
      COPIED
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const urlInput = document.getElementById("video-url");
            const resultsArea = document.getElementById("results-area");
            const emptyState = document.getElementById("empty-state");
            const previewImg = document.getElementById("preview-img");
            const standardLink = document.getElementById("link-standard");
            const shortsLink = document.getElementById("link-shorts");
            const embedCode = document.getElementById("embed-code");

            const extractId = (input) => {
                const shortsRegex = /\/shorts\/([a-zA-Z0-9_-]{11})/;
                const standardRegex = /(?:v=|v\/|embed\/|youtu.be\/)([a-zA-Z0-9_-]{11})/;
                const shortsMatch = input.match(shortsRegex);
                const standardMatch = input.match(standardRegex);
                return shortsMatch ? shortsMatch[1] : (standardMatch ? standardMatch[1] : null);
            };

            const updateTool = () => {
                const val = urlInput.value.trim();
                const videoId = extractId(val);
                if (videoId) {
                    const thumbUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                    const watchUrl = `https://www.youtube.com/watch?v=${videoId}`;
                    const shortUrl = `https://www.youtube.com/shorts/${videoId}`;
                    previewImg.src = thumbUrl;
                    previewImg.onerror = () => { previewImg.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`; };
                    standardLink.textContent = watchUrl;
                    shortsLink.textContent = shortUrl;
                    const code = `<a href="${watchUrl}">\n  <img src="${thumbUrl}" alt="YouTube Video" style="width:100%; max-width:400px; border-radius:4px;" />\n</a>`;
                    embedCode.textContent = code;
                    resultsArea.classList.remove("hidden");
                    emptyState.classList.add("hidden");
                } else {
                    resultsArea.classList.add("hidden");
                    emptyState.classList.remove("hidden");
                }
            };

            window.copyText = (elementId) => {
                const el = document.getElementById(elementId);
                const text = el.innerText || el.textContent;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                const toast = document.getElementById('copy-toast');
                toast.style.opacity = "1";
                setTimeout(() => toast.style.opacity = "0", 2000);
            };

            urlInput.addEventListener("input", updateTool);
        });
    </script>
  </body>
</html>
