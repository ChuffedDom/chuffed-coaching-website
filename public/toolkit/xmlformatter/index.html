<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XML Formatter | Chuffed Toolkit</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Shared Styles -->
    <link rel="stylesheet" href="../../reset.css" />
    <link rel="stylesheet" href="../../colour.css" />
    <link rel="stylesheet" href="../../typography.css" />
    <link rel="stylesheet" href="../../layout.css" />
    <link rel="stylesheet" href="../../call-to-action.css" />

    <style>
      .app-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 32px;
      }

      .form-section {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .code-output {
        width: 100%;
        min-height: 400px;
        background-color: var(--background);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 16px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: var(--primary-text);
        white-space: pre-wrap;
        overflow-x: auto;
      }

      .checkbox-group {
        display: flex;
        gap: 24px;
        align-items: center;
        margin: 12px 0;
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--accent-coral);
      }
    </style>
  </head>
  <body>
    <section>
      <div class="container">
        <header style="text-align: center; margin-bottom: 64px;">
          <h1>XML Formatter<span class="text-accent">.</span></h1>
          <p class="lead-text">Generate structured XML items for events and articles.</p>
        </header>

        <main class="app-grid">
          <!-- Input Form -->
          <div class="panel">
            <div class="panel-header">
              <div class="panel-marker"></div>
              <span class="label">ITEM DATA</span>
            </div>
            <div class="panel-content">
              <form id="xml-generator-form" class="form-section" style="width: 100%">
                <div>
                  <span class="label">TITLE</span>
                  <input type="text" id="xml-title" placeholder="Event Title">
                </div>
                <div>
                  <span class="label">LINK</span>
                  <input type="url" id="xml-link" placeholder="https://...">
                </div>
                <div>
                  <span class="label">DESCRIPTION</span>
                  <textarea id="xml-description" rows="3" placeholder="Brief summary..."></textarea>
                </div>
                <div>
                  <span class="label">PUBLICATION DATE</span>
                  <input type="text" id="xml-pubDate" placeholder="Wed, 15 Oct 2025 19:00:00 GMT">
                </div>
                <div class="checkbox-group">
                  <div class="checkbox-item">
                    <input type="checkbox" id="xml-online">
                    <span class="label">ONLINE</span>
                  </div>
                  <div class="checkbox-item">
                    <input type="checkbox" id="xml-featured">
                    <span class="label">FEATURED</span>
                  </div>
                </div>
                <div>
                  <span class="label">IMAGE URL</span>
                  <input type="url" id="xml-image" placeholder="https://...">
                </div>
              </form>
            </div>
          </div>

          <!-- Output -->
          <div class="panel">
            <div class="panel-header" style="justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 12px;">
                <div class="panel-marker"></div>
                <span class="label">GENERATED XML</span>
              </div>
              <button id="copy-xml-btn" class="read-more-btn" style="margin: 0">COPY</button>
            </div>
            <div class="panel-content">
              <div id="xml-output" class="code-output"></div>
              <button id="copy-xml-btn-large" class="cta-button" style="width: 100%; margin-top: 16px;">COPY TO CLIPBOARD</button>
            </div>
          </div>
        </main>

        <footer style="text-align: center; border: none; padding-top: 96px;">
          <a href="../" class="label" style="color: var(--primary-text); text-decoration: none;">
            ← Back to Toolkit
          </a>
        </footer>
      </div>
    </section>

    <div id="copy-toast" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background-color: var(--highlight); color: var(--background); padding: 8px 16px; border-radius: 2px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;">
      COPIED
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const xmlForm = document.getElementById("xml-generator-form");
        const xmlOutput = document.getElementById("xml-output");
        const copyBtn = document.getElementById("copy-xml-btn");
        const copyBtnLarge = document.getElementById("copy-xml-btn-large");

        const escapeXML = (str) => str.replace(/[<>&"']/g, m => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":"&apos;"}[m]));

        const updateXmlOutput = () => {
          const title = document.getElementById("xml-title").value;
          const link = document.getElementById("xml-link").value;
          const description = document.getElementById("xml-description").value;
          const pubDate = document.getElementById("xml-pubDate").value;
          const isOnline = document.getElementById("xml-online").checked;
          const isFeatured = document.getElementById("xml-featured").checked;
          const image = document.getElementById("xml-image").value;

          const xmlString = `<item>\n  <title>${escapeXML(title)}</title>\n  <link>${escapeXML(link)}</link>\n  <description>${escapeXML(description)}</description>\n  <pubDate>${escapeXML(pubDate)}</pubDate>\n  <online>${isOnline}</online>\n  <featured>${isFeatured}</featured>\n  <image>${escapeXML(image)}</image>\n</item>`;
          xmlOutput.textContent = xmlString;
        };

        const copyToClipboard = () => {
          navigator.clipboard.writeText(xmlOutput.textContent);
          const toast = document.getElementById('copy-toast');
          toast.style.opacity = "1";
          setTimeout(() => toast.style.opacity = "0", 2000);
        };

        xmlForm.addEventListener("input", updateXmlOutput);
        copyBtn.addEventListener("click", copyToClipboard);
        copyBtnLarge.addEventListener("click", copyToClipboard);
        updateXmlOutput();
      });
    </script>
  </body>
</html>
