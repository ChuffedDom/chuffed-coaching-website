<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNGtation | Chuffed Toolkit</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Shared Styles -->
    <link rel="stylesheet" href="../../reset.css" />
    <link rel="stylesheet" href="../../colour.css" />
    <link rel="stylesheet" href="../../typography.css" />
    <link rel="stylesheet" href="../../layout.css" />
    <link rel="stylesheet" href="../../call-to-action.css" />

    <style>
      .app-layout {
        display: flex;
        gap: 32px;
        height: calc(100vh - 300px);
        min-height: 500px;
      }

      .sidebar {
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .slide-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-right: 8px;
      }

      .slide-item {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        transition: border-color 0.2s;
      }

      .slide-item:hover {
        border-color: var(--secondary-text);
      }

      .slide-item.active {
        border-color: var(--accent-coral);
      }

      .slide-item img {
        width: 60px;
        height: 40px;
        object-fit: cover;
        border-radius: 2px;
        filter: none !important; /* Don't apply brand filter to thumbnails */
      }

      .slide-item .slide-info {
        flex: 1;
        overflow: hidden;
      }

      .slide-item .slide-name {
        font-size: 0.75rem;
        color: var(--primary-text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .viewer {
        flex: 1;
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .viewer img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        filter: none !important;
      }

      .drop-zone {
        border: 2px dashed var(--border);
        border-radius: 4px;
        padding: 48px 24px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s;
      }

      .drop-zone:hover {
        border-color: var(--accent-coral);
      }

      /* Modal Styling */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal-panel {
        width: 100%;
        max-width: 600px;
        margin: 24px;
      }

      .presentation-overlay {
        position: fixed;
        inset: 0;
        background-color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }
    </style>
  </head>
  <body>
    <section>
      <div class="container">
        <header style="text-align: center; margin-bottom: 64px;">
          <div style="display: flex; justify-content: flex-end; margin-bottom: -40px; gap: 16px;">
            <button id="present-btn" class="cta-button">PRESENT</button>
            <button id="settings-btn" class="read-more-btn" style="margin: 0">UPLOAD</button>
          </div>
          <h1>PNGtation<span class="text-accent">.</span></h1>
          <p class="lead-text">Convert PNG sequences into professional slide decks.</p>
        </header>

        <main class="app-layout">
          <!-- Sidebar: Slide List -->
          <div class="sidebar">
            <div class="panel" style="height: 100%">
              <div class="panel-header">
                <div class="panel-marker"></div>
                <span class="label">SLIDES</span>
              </div>
              <div class="panel-content" style="padding: 12px;">
                <div id="file-list" class="slide-list">
                  <!-- Slides injected here -->
                </div>
              </div>
            </div>
          </div>

          <!-- Viewer -->
          <div class="viewer" id="presentation-view">
            <div id="empty-state-message" style="text-align: center">
              <p class="label">NO SLIDES LOADED</p>
              <button onclick="document.getElementById('settings-btn').click()" class="read-more-btn">LOAD PNGS</button>
            </div>
          </div>
        </main>

        <footer style="text-align: center; border: none; padding-top: 96px;">
          <a href="../" class="label" style="color: var(--primary-text); text-decoration: none;">
            ← Back to Toolkit
          </a>
        </footer>
      </div>
    </section>

    <!-- Upload Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
      <div class="panel modal-panel">
        <div class="panel-header">
          <div class="panel-marker"></div>
          <span class="label">UPLOAD PNG ASSETS</span>
        </div>
        <div class="panel-content">
          <div id="drop-zone" class="drop-zone">
            <input type="file" id="file-upload" class="hidden" accept=".png,image/png" multiple>
            <p class="label">DRAG & DROP PNGS OR CLICK TO BROWSE</p>
          </div>
          <div style="display: flex; justify-content: space-between; margin-top: 24px; width: 100%;">
            <button id="clear-all-btn" class="read-more-btn" style="color: var(--accent-coral)">CLEAR ALL</button>
            <button id="close-modal-btn" class="cta-button">CLOSE</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Presentation Mode Overlay -->
    <div id="presentation-overlay" class="presentation-overlay hidden">
      <img id="presenter-img" src="" alt="Presentation Slide">
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const settingsBtn = document.getElementById("settings-btn");
        const settingsModal = document.getElementById("settings-modal");
        const closeModalBtn = document.getElementById("close-modal-btn");
        const clearAllBtn = document.getElementById("clear-all-btn");
        const emptyStateMessage = document.getElementById("empty-state-message");
        const presentationView = document.getElementById("presentation-view");
        const presentBtn = document.getElementById("present-btn");
        const presentationOverlay = document.getElementById("presentation-overlay");
        const presenterImg = document.getElementById("presenter-img");
        const fileList = document.getElementById("file-list");
        const dropZone = document.getElementById("drop-zone");
        const fileUpload = document.getElementById("file-upload");
        
        let isPresenting = false;
        let currentSelectedFile = null;
        const dbName = "PngtationDB";
        const storeName = "pngFiles";
        const slideOrderKey = "__slideOrder__";
        let db;

        const openModal = () => settingsModal.classList.remove("hidden");
        const closeModal = () => settingsModal.classList.add("hidden");

        const clearAllData = async () => {
          if (!confirm("Clear all slides?")) return;
          const transaction = db.transaction([storeName], "readwrite");
          await transaction.objectStore(storeName).clear();
          fileList.innerHTML = "";
          updateMainView();
          closeModal();
        };

        const enterPresentationMode = () => {
          const currentSlide = document.querySelector(".slide-item.active") || document.querySelector(".slide-item");
          if (!currentSlide) return;
          presenterImg.src = currentSlide.dataset.objecturl;
          presentationOverlay.classList.remove("hidden");
          presentationOverlay.requestFullscreen().catch(() => {});
          isPresenting = true;
        };

        const exitPresentationMode = () => {
          if (document.fullscreenElement) document.exitFullscreen();
          presentationOverlay.classList.add("hidden");
          isPresenting = false;
        };

        const handleFullscreenChange = () => {
          if (!document.fullscreenElement && isPresenting) {
            presentationOverlay.classList.add("hidden");
            isPresenting = false;
          }
        };

        settingsBtn.addEventListener("click", openModal);
        closeModalBtn.addEventListener("click", closeModal);
        clearAllBtn.addEventListener("click", clearAllData);
        document.addEventListener("fullscreenchange", handleFullscreenChange);
        presentBtn.addEventListener("click", enterPresentationMode);
        presentationOverlay.addEventListener("click", (e) => { if (e.target === presentationOverlay) exitPresentationMode(); });

        const initDB = () => {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(dbName, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(storeName);
            request.onsuccess = (e) => { db = e.target.result; resolve(db); };
            request.onerror = (e) => reject(e.target.error);
          });
        };

        const storeItem = (key, value) => {
          return new Promise((resolve, reject) => {
            const transaction = db.transaction([storeName], "readwrite");
            const request = transaction.objectStore(storeName).put(value, key);
            request.onsuccess = () => resolve();
            request.onerror = (e) => reject(e.target.error);
          });
        };

        const deleteItemFromDB = (key) => {
          const transaction = db.transaction([storeName], "readwrite");
          return transaction.objectStore(storeName).delete(key);
        };

        const loadAllItemsFromDB = () => {
          return new Promise((resolve, reject) => {
            const transaction = db.transaction([storeName], "readonly");
            const store = transaction.objectStore(storeName);
            const request = store.getAll();
            const keysRequest = store.getAllKeys();
            let results, keys;
            request.onsuccess = () => { results = request.result; if (keys) resolve({ keys, results }); };
            keysRequest.onsuccess = () => { keys = keysRequest.result; if (results) resolve({ keys, results }); };
            request.onerror = (e) => reject(e.target.error);
          });
        };

        const renderFile = (file) => {
          if (!file) return;
          const objectURL = URL.createObjectURL(file);
          const fileItem = document.createElement("div");
          fileItem.className = "slide-item";
          fileItem.dataset.filename = file.name;
          fileItem.dataset.objecturl = objectURL;
          fileItem.innerHTML = `
            <img src="${objectURL}" alt="${file.name}">
            <div class="slide-info">
              <p class="slide-name">${file.name}</p>
            </div>
            <button class="read-more-btn remove-btn" style="margin:0; padding:4px; position:absolute; right:4px; top:4px; color:var(--accent-coral)">×</button>
          `;
          fileList.appendChild(fileItem);
          updateMainView();
        };

        const updateMainView = () => {
          const hasFiles = fileList.children.length > 0;
          emptyStateMessage.classList.toggle("hidden", hasFiles);
        };

        const displaySlide = (slideItem) => {
          if (!slideItem) { presentationView.innerHTML = ""; return; }
          document.querySelectorAll(".slide-item").forEach(i => i.classList.remove("active"));
          slideItem.classList.add("active");
          presentationView.innerHTML = `<img src="${slideItem.dataset.objecturl}" alt="Slide">`;
          if (isPresenting) presenterImg.src = slideItem.dataset.objecturl;
        };

        dropZone.addEventListener("click", () => fileUpload.click());
        fileUpload.addEventListener("change", async (e) => {
          for (const file of e.target.files) {
            if (file.type === "image/png") {
              await storeItem(file.name, file);
              renderFile(file);
            }
          }
          closeModal();
        });

        fileList.addEventListener("click", async (e) => {
          const slideItem = e.target.closest(".slide-item");
          const removeBtn = e.target.closest(".remove-btn");
          if (removeBtn) {
            e.stopPropagation();
            const name = slideItem.dataset.filename;
            await deleteItemFromDB(name);
            slideItem.remove();
            updateMainView();
            return;
          }
          if (slideItem) displaySlide(slideItem);
        });

        const advanceSlide = () => {
          const slides = Array.from(fileList.children);
          const current = document.querySelector(".slide-item.active");
          const index = slides.indexOf(current);
          const next = slides[(index + 1) % slides.length];
          if (next) displaySlide(next);
        };

        document.addEventListener("keydown", (e) => {
          if (e.code === "Space") { e.preventDefault(); advanceSlide(); }
          if (e.key === "Escape" && isPresenting) exitPresentationMode();
        });

        initDB().then(async () => {
          const { keys, results } = await loadAllItemsFromDB();
          results.forEach((item, i) => { if (item instanceof File) renderFile(item); });
          updateMainView();
        });
      });
    </script>
  </body>
</html>
