<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timelinked | Chuffed Toolkit</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Shared Styles -->
    <link rel="stylesheet" href="../../reset.css" />
    <link rel="stylesheet" href="../../colour.css" />
    <link rel="stylesheet" href="../../typography.css" />
    <link rel="stylesheet" href="../../layout.css" />
    <link rel="stylesheet" href="../../call-to-action.css" />

    <style>
      .results-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 24px;
      }

      .results-table th, .results-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      .results-table th {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: var(--secondary-text);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .results-table td {
        font-size: 0.875rem;
        color: var(--primary-text);
      }

      /* Modal Styling */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }

      .modal-panel {
        width: 100%;
        max-width: 500px;
        margin: 24px;
      }
    </style>
  </head>
  <body>
    <section>
      <div class="container" style="max-width: 800px; margin: 0 auto;">
        <header style="text-align: center; margin-bottom: 64px;">
          <div style="display: flex; justify-content: flex-end; margin-bottom: -40px;">
            <button id="settings-btn" class="read-more-btn" style="margin: 0">TIMEZONE</button>
          </div>
          <h1>Timelinked<span class="text-accent">.</span></h1>
          <p class="lead-text">
            Get exact timestamps for LinkedIn posts to anticipate user activity.
          </p>
        </header>

        <!-- Input Panel -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-marker"></div>
            <span class="label">ADD POST URL</span>
          </div>
          <div class="panel-content">
            <div style="display: flex; gap: 16px; width: 100%;">
              <input type="url" id="linkedin-url" placeholder="https://www.linkedin.com/posts/..." style="flex: 1">
              <button id="add-btn" class="cta-button" disabled>ADD</button>
            </div>
          </div>
        </div>

        <!-- URL List Panel -->
        <div id="url-container-panel" class="panel" style="margin-top: 48px;">
          <div class="panel-header">
            <div class="panel-marker"></div>
            <span class="label">TIMESTAMP DATA</span>
          </div>
          <div class="panel-content">
            <div id="url-container" style="width: 100%">
                <!-- Table injected here -->
            </div>
            
            <div id="clear-table-container" class="hidden" style="width: 100%; text-align: right; margin-top: 24px;">
              <button id="clear-table-btn" class="read-more-btn" style="color: var(--accent-coral)">CLEAR ALL DATA</button>
              <div id="clear-table-confirm" class="hidden" style="gap: 12px; justify-content: flex-end; align-items: center;">
                <span class="label">CONFIRM?</span>
                <button id="clear-table-yes" class="read-more-btn" style="color: var(--accent-coral)">YES</button>
                <button id="clear-table-no" class="read-more-btn">NO</button>
              </div>
            </div>
          </div>
        </div>

        <footer style="text-align: center; border: none; padding-top: 96px;">
          <a href="../" class="label" style="color: var(--primary-text); text-decoration: none;">
            ← Back to Toolkit
          </a>
        </footer>
      </div>
    </section>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
      <div class="panel modal-panel">
        <div class="panel-header">
          <div class="panel-marker"></div>
          <span class="label">TIMEZONE SETTINGS</span>
        </div>
        <div class="panel-content">
          <div style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
            <div>
              <span class="label">SELECT REGION</span>
              <select id="timezone-select" style="width: 100%">
                <optgroup label="UK"><option value="Europe/London">London (GMT/BST)</option></optgroup>
                <optgroup label="USA">
                  <option value="America/New_York">Eastern Time (ET)</option>
                  <option value="America/Chicago">Central Time (CT)</option>
                  <option value="America/Denver">Mountain Time (MT)</option>
                  <option value="America/Los_Angeles">Pacific Time (PT)</option>
                </optgroup>
                <optgroup label="Europe"><option value="Europe/Paris">Paris (CET)</option></optgroup>
              </select>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px;">
              <button id="cancel-btn" class="read-more-btn">CANCEL</button>
              <button id="save-btn" class="cta-button">SAVE</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const settingsBtn = document.getElementById("settings-btn");
        const settingsModal = document.getElementById("settings-modal");
        const cancelBtn = document.getElementById("cancel-btn");
        const saveBtn = document.getElementById("save-btn");
        const timezoneSelect = document.getElementById("timezone-select");
        const urlInput = document.getElementById("linkedin-url");
        const addBtn = document.getElementById("add-btn");
        const urlContainer = document.getElementById("url-container");
        const POSTS_STORAGE_KEY = "timelinkedPosts";
        const SETTINGS_KEY = "timelinkedTimezone";
        const clearTableBtn = document.getElementById("clear-table-btn");
        const clearTableConfirm = document.getElementById("clear-table-confirm");
        const clearTableYes = document.getElementById("clear-table-yes");
        const clearTableNo = document.getElementById("clear-table-no");

        const openModal = () => settingsModal.classList.remove("hidden");
        const closeModal = () => settingsModal.classList.add("hidden");
        settingsBtn.addEventListener("click", openModal);
        cancelBtn.addEventListener("click", closeModal);
        saveBtn.addEventListener("click", () => { localStorage.setItem(SETTINGS_KEY, timezoneSelect.value); renderUrls(); closeModal(); });

        function getPostIdFromUrl(u) { return u ? /([0-9]{19})/.exec(u)?.pop() : null; }
        function getCommentIdFromUrl(u) { if (!u) return null; const m = /fsd_comment:\((\d+),urn:li:activity:\d+\)/.exec(decodeURIComponent(u)); return m ? m[1] : null; }
        function extractUnixTimestamp(id) { if (!id) return null; return parseInt(BigInt(id).toString(2).slice(0, 41), 2); }
        function formatTimestamp(ts, tz) {
          if (!ts) return "Invalid Date";
          return new Intl.DateTimeFormat("en-GB", { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false, timeZoneName: "short", timeZone: tz }).format(new Date(ts));
        }

        const renderUrls = () => {
          const posts = JSON.parse(localStorage.getItem(POSTS_STORAGE_KEY)) || [];
          const tz = localStorage.getItem(SETTINGS_KEY) || "Europe/London";
          urlContainer.innerHTML = "";
          document.getElementById("clear-table-container").classList.toggle("hidden", posts.length === 0);
          if (posts.length === 0) {
            urlContainer.innerHTML = `<p class="label" style="text-align: center; padding: 32px;">NO DATA RECORDED</p>`;
            return;
          }
          const table = document.createElement("table");
          table.className = "results-table";
          table.innerHTML = `<thead><tr><th>POST URL</th><th>TIMESTAMP</th><th style="width:40px"></th></tr></thead><tbody></tbody>`;
          const tbody = table.querySelector("tbody");
          posts.forEach(p => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap">
                <a href="${p.url}" target="_blank" class="text-accent">${p.url}</a>
              </td>
              <td>${formatTimestamp(p.timestamp, tz)}</td>
              <td style="text-align: right">
                <button class="read-more-btn delete-btn" style="margin:0; color:var(--accent-coral)" data-url="${p.url}">×</button>
              </td>
            `;
            tbody.appendChild(row);
          });
          urlContainer.appendChild(table);
        };

        addBtn.addEventListener("click", () => {
          const url = urlInput.value.trim();
          if (!url) return;
          const posts = JSON.parse(localStorage.getItem(POSTS_STORAGE_KEY)) || [];
          if (!posts.some(p => p.url === url)) {
            const id = getCommentIdFromUrl(url) || getPostIdFromUrl(url);
            posts.unshift({ url: url, timestamp: extractUnixTimestamp(id) });
          }
          localStorage.setItem(POSTS_STORAGE_KEY, JSON.stringify(posts));
          urlInput.value = ""; addBtn.disabled = true; renderUrls();
        });

        urlInput.addEventListener("input", () => addBtn.disabled = urlInput.value.trim() === "");
        urlContainer.addEventListener("click", e => {
          const btn = e.target.closest(".delete-btn");
          if (btn) {
            let posts = JSON.parse(localStorage.getItem(POSTS_STORAGE_KEY)) || [];
            posts = posts.filter(p => p.url !== btn.dataset.url);
            localStorage.setItem(POSTS_STORAGE_KEY, JSON.stringify(posts));
            renderUrls();
          }
        });

        clearTableBtn.addEventListener("click", () => { clearTableBtn.classList.add("hidden"); clearTableConfirm.classList.remove("hidden"); clearTableConfirm.style.display = "flex"; });
        clearTableNo.addEventListener("click", () => { clearTableConfirm.classList.add("hidden"); clearTableConfirm.style.display = "none"; clearTableBtn.classList.remove("hidden"); });
        clearTableYes.addEventListener("click", () => { localStorage.removeItem(POSTS_STORAGE_KEY); renderUrls(); clearTableNo.click(); });

        timezoneSelect.value = localStorage.getItem(SETTINGS_KEY) || "Europe/London";
        renderUrls();
      });
    </script>
  </body>
</html>
