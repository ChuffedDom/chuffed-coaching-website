<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedOut | Chuffed Toolkit</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Shared Styles -->
    <link rel="stylesheet" href="../../reset.css" />
    <link rel="stylesheet" href="../../colour.css" />
    <link rel="stylesheet" href="../../typography.css" />
    <link rel="stylesheet" href="../../layout.css" />
    <link rel="stylesheet" href="../../call-to-action.css" />

    <style>
        .control-panel {
            margin-bottom: 48px;
            width: 100%;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            width: 100%;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--surface);
            border: 1px solid var(--border);
            transition: .2s;
            border-radius: 10px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: var(--secondary-text);
            transition: .2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--surface);
            border-color: var(--accent-coral);
        }
        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: var(--accent-coral);
        }

        .connection-card {
            height: 100%;
        }

        .connection-details {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            padding: 8px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-row .label {
            font-size: 0.65rem;
            color: var(--secondary-text);
            margin-bottom: 2px;
        }

        .info-row .value {
            font-size: 0.75rem;
            color: var(--primary-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--secondary-text);
            cursor: pointer;
            padding: 4px;
        }

        .copy-btn:hover {
            color: var(--accent-coral);
        }

        #empty-state {
            padding: 96px 24px;
            text-align: center;
            border: 1px dashed var(--border);
            border-radius: 4px;
            width: 100%;
        }
.sticky-controls {
    position: sticky;
    top: 0;
    z-index: 10;
    background-color: var(--background);
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
}

.line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.connection-name {
    font-size: 1.1rem !important;
    line-height: 1.3;
    height: 2.86rem; /* line-height * 2 */
    margin-bottom: 4px !important;
}

.connection-tagline {
    font-size: 0.875rem !important;
    line-height: 1.4;
    height: 2.45rem; /* line-height * 2 */
    margin-bottom: 8px !important;
}
            margin-bottom: 48px;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <section>
        <div class="container">
            <header style="text-align: center; margin-bottom: 64px;">
                <h1>LinkedOut<span class="text-accent">.</span></h1>
                <p class="lead-text">View connections and track CRM status from your exported CSV.</p>
                
                <label for="fileInput" class="cta-button" style="margin-top: 24px;">
                    Upload CSV
                </label>
                <input type="file" id="fileInput" accept=".csv" onchange="handleFileSelect(event)" style="display: none;">
            </header>

            <!-- Control Bar -->
            <div id="controlBar" class="panel control-panel hidden">
                <div class="panel-header">
                    <div class="panel-marker"></div>
                    <span class="label">FILTERS & SEARCH</span>
                </div>
                <div class="panel-content">
                    <div class="filter-group">
                        <div class="filter-item">
                            <span class="label">SEARCH</span>
                            <input type="text" id="search" oninput="applyFilters()" placeholder="Name, role, or company...">
                        </div>
                        <div class="filter-item">
                            <span class="label">DATE RANGE</span>
                            <input type="text" id="dateRange" placeholder="Select range...">
                        </div>
                        <div class="filter-item" style="flex: 0; min-width: auto; align-items: center;">
                            <span class="label">HIDE CRM</span>
                            <label class="switch">
                                <input type="checkbox" id="hideCRM" onchange="applyFilters()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="filter-item" style="flex: 0; min-width: auto;">
                            <button onclick="resetView()" class="read-more-btn" style="margin: 0; padding: 12px 0;">RESET</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="stats" class="label" style="margin-bottom: 16px; text-align: right;"></div>

            <!-- Connection Grid -->
            <main id="connectionContainer" class="grid"></main>

            <!-- Initial/Empty State -->
            <div id="emptyState" class="panel">
                <div class="panel-content" style="align-items: center; padding: 96px 24px;">
                    <p class="lead-text" id="emptyText">Upload your Connections.csv to begin.</p>
                    <p class="body-text" style="text-align: center;">CRM status is saved locally to your browser.</p>
                </div>
            </div>

            <footer style="text-align: center; border: none; padding-top: 96px;">
              <a href="../" class="label" style="color: var(--primary-text); text-decoration: none;">
                ← Back to Toolkit
              </a>
            </footer>
        </div>
    </section>

    <div id="copy-toast" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background-color: var(--highlight); color: var(--background); padding: 8px 16px; border-radius: 2px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;">
      COPIED
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        const STORAGE_KEY = 'linkedout_crm_statuses';
        let crmStatuses = new Map();
        let allConnections = [];
        let datePicker;

        document.addEventListener('DOMContentLoaded', function() {
            datePicker = flatpickr("#dateRange", {
                mode: "range",
                dateFormat: "Y-m-d",
                onChange: function() { applyFilters(); }
            });
        });

        function loadCRMStatuses() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const data = JSON.parse(stored);
                    crmStatuses = new Map(Object.entries(data));
                }
            } catch (err) { console.error("Load error:", err); }
        }

        function saveCRMStatuses() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.fromEntries(crmStatuses)));
            } catch (err) { console.error("Save error:", err); }
        }

        function toggleCRM(url, checked) {
            if (!url) return;
            crmStatuses.set(url, checked);
            saveCRMStatuses();
        }

        loadCRMStatuses();

        window.handleFileSelect = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                parseCSV(text);
                applyFilters();
                
                if (allConnections.length > 0) {
                    document.getElementById('controlBar').classList.remove('hidden');
                    document.getElementById('emptyState').classList.add('hidden');
                }
            };
            reader.readAsText(file);
        };

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            let headerIndex = -1;
            for(let i = 0; i < Math.min(lines.length, 10); i++) {
                if(lines[i].includes('First Name')) { headerIndex = i; break; }
            }
            if (headerIndex === -1) headerIndex = 3; 

            const dataLines = lines.slice(headerIndex);
            allConnections = dataLines.slice(1)
                .filter(line => line.trim() !== '')
                .map(line => {
                    const row = parseCSVLine(line);
                    const connectedOnStr = row[6] || '';
                    const connectedOnDate = new Date(connectedOnStr);
                    return {
                        firstName: row[0] || '',
                        lastName: row[1] || '',
                        fullName: `${row[0] || ''} ${row[1] || ''}`.trim(),
                        url: row[2] || '',
                        email: row[3] || '',
                        company: row[4] || '',
                        position: row[5] || '',
                        connectedOn: connectedOnStr,
                        connectedOnDate: isNaN(connectedOnDate.getTime()) ? null : connectedOnDate
                    };
                })
                .filter(conn => conn.firstName || conn.lastName);
            
            updateStats(allConnections.length);
        }

        function parseCSVLine(text) {
            const result = [];
            let cell = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(cell.trim());
                    cell = '';
                } else cell += char;
            }
            result.push(cell.trim());
            return result;
        }

        window.applyFilters = function() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const hideCRM = document.getElementById('hideCRM').checked;
            const selectedDates = datePicker ? datePicker.selectedDates : [];

            const filtered = allConnections.filter(c => {
                const matchesSearch = c.fullName.toLowerCase().includes(searchTerm) || 
                                     c.company.toLowerCase().includes(searchTerm) || 
                                     c.position.toLowerCase().includes(searchTerm) ||
                                     c.email.toLowerCase().includes(searchTerm);
                
                const isInCRM = crmStatuses.get(c.url) || false;
                const matchesCRMFilter = !hideCRM || !isInCRM;

                let matchesDateFilter = true;
                if (selectedDates.length === 2 && c.connectedOnDate) {
                    const start = selectedDates[0];
                    const end = selectedDates[1];
                    const connDate = new Date(c.connectedOnDate);
                    connDate.setHours(0, 0, 0, 0);
                    const startDate = new Date(start);
                    startDate.setHours(0, 0, 0, 0);
                    const endDate = new Date(end);
                    endDate.setHours(23, 59, 59, 999);
                    matchesDateFilter = connDate >= startDate && connDate <= endDate;
                }
                return matchesSearch && matchesCRMFilter && matchesDateFilter;
            });

            renderConnections(filtered);
            updateStats(filtered.length);
        };

        function renderConnections(connections) {
            const container = document.getElementById('connectionContainer');
            const emptyState = document.getElementById('emptyState');
            const emptyText = document.getElementById('emptyText');
            
            container.innerHTML = '';
            
            if (connections.length === 0 && allConnections.length > 0) {
                emptyState.classList.remove('hidden');
                emptyText.textContent = "No connections match filters.";
            } else if (connections.length > 0) {
                emptyState.classList.add('hidden');
            }
            
            connections.forEach(conn => {
                const isInCRM = crmStatuses.get(conn.url) || false;
                const card = document.createElement('div');
                card.className = "panel connection-card";
                
                card.innerHTML = `
                    <div class="panel-header">
                        <div class="panel-marker" style="${isInCRM ? '' : 'background-color: var(--secondary-text)'}"></div>
                        <span class="label">${conn.connectedOn}</span>
                    </div>
                    <div class="panel-content">
                        <h3 class="connection-name line-clamp-2">${conn.fullName}</h3>
                        <p class="body-text connection-tagline line-clamp-2">${conn.position} at ${conn.company}</p>
                        
                        <div class="connection-details">
                            <div class="info-row">
                                <div style="flex: 1; overflow: hidden;">
                                    <span class="label">LINKEDIN</span>
                                    <div class="value">
                                        <a href="${conn.url}" target="_blank" rel="noopener noreferrer" style="color: inherit;">${conn.url}</a>
                                    </div>
                                </div>
                                <button onclick="window.open('${conn.url}', '_blank')" class="copy-btn"><i class="fas fa-external-link-alt"></i></button>
                                <button onclick="copyToClipboard('${conn.url}')" class="copy-btn"><i class="far fa-copy"></i></button>
                            </div>
                            
                            <div class="info-row">
                                <div style="flex: 1; overflow: hidden;">
                                    <span class="label">EMAIL</span>
                                    <div class="value">${conn.email || 'N/A'}</div>
                                </div>
                                ${conn.email ? `<button onclick="copyToClipboard('${conn.email}')" class="copy-btn"><i class="far fa-copy"></i></button>` : ''}
                            </div>
                        </div>

                        <div style="margin-top: 16px; display: flex; align-items: center; gap: 8px;">
                            <label class="switch">
                                <input type="checkbox" ${isInCRM ? 'checked' : ''} onchange="handleCRMChange('${conn.url}', this.checked)">
                                <span class="slider"></span>
                            </label>
                            <span class="label">IN CRM</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.handleCRMChange = function(url, checked) {
            toggleCRM(url, checked);
            if (document.getElementById('hideCRM').checked) { applyFilters(); }
        };

        window.copyToClipboard = function(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            const toast = document.getElementById('copy-toast');
            toast.style.opacity = "1";
            setTimeout(() => toast.style.opacity = "0", 2000);
        };

        function updateStats(count) {
            document.getElementById('stats').textContent = `${count} CONNECTIONS FOUND`;
        }

        window.resetView = function() {
            document.getElementById('search').value = '';
            document.getElementById('hideCRM').checked = false;
            if (datePicker) datePicker.clear();
            applyFilters();
        };
    </script>
</body>
</html>
