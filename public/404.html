<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 | Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <style media="screen">
      body {
        background: #0a0b0a;
        color: #7d827d;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      #message {
        background: #0a0b0a;
        border: 1px solid #2c2e2c;
        max-width: 480px;
        padding: 48px;
        border-radius: 2px;
      }
      h2 {
        color: hsl(343, 93%, 52%);
        font-family: "JetBrains Mono", monospace;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin: 0 0 16px;
      }
      h1 {
        font-family: "JetBrains Mono", monospace;
        font-size: 2.5rem;
        font-weight: 700;
        color: #e4e6e4;
        margin: 0 0 24px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      p {
        line-height: 1.6;
        margin: 0 0 32px;
        font-size: 1rem;
      }
      a {
        display: inline-block;
        background: #e4e6e4;
        text-transform: uppercase;
        text-decoration: none;
        color: #0a0b0a;
        padding: 12px 24px;
        border-radius: 2px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 0.875rem;
        letter-spacing: 0.1em;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      a:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 0 hsl(343, 93%, 52%);
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404 Error</h2>
      <h1>Page Not Found<span style="color: hsl(343, 93%, 52%)">.</span></h1>
      <p>
        The page you are looking for does not exist or has been moved to a new
        location.
      </p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
