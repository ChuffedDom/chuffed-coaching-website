<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for social media icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../reset.css" />
    <link rel="stylesheet" href="../colour.css" />
    <link rel="stylesheet" href="../typography.css" />
    <link rel="stylesheet" href="../layout.css" />
    <title>Chuffed Coaching - Dom Maurice</title>
    <!-- Meta tags for SEO -->
    <meta name="title" content="Dom Maurice - Chuffed Coaching" />
    <meta
      name="description"
      content="Connect with Dom Maurice on his social media platforms."
    />
    <meta
      name="author"
      content="Dom, Head of Product and Professional Tinkerer"
    />

    <style>
      /* Page-specific styles */

      /* The main container for the social links.
         Uses flexbox to stack links vertically with a gap of 2rem (32px),
         which is a multiple of 16px. */
      .social-links {
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      /* Container for each card, applying the 'card' style and adding hover effect.
         The 'card' class is defined in your layout.css with a grey background and padding. */
      .social-link-card {
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        border-radius: 2px;
      }

      /* Hover effect for the entire card */
      .social-link-card:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 0 var(--accent-coral);
      }

      /* Style for the link itself within the card */
      .social-link-card a {
        display: flex; /* Use flexbox to align icon and text */
        align-items: center;
        gap: 16px; /* Space between icon and text */
        text-decoration: none; /* Remove underline */
        color: var(--secondary-text);
        font-family: "JetBrains Mono", monospace;
        font-size: 1.5rem; /* 24px, a multiple of 16px */
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }

      /* Hover effect for the text inside the card */
      .social-link-card a:hover {
        color: var(--primary-text);
      }

      /* Style for the social media icons */
      .social-link-card a i {
        width: 1.5rem; /* Set a fixed width for the icons to prevent text shifting */
        text-align: center;
      }

      /* Use a grid layout to handle responsiveness, similar to the main site.
         Each grid item will take up an equal amount of space on larger screens,
         and stack on smaller screens. */
       .grid-single {
         max-width: 600px;
       }

       .profile-header {
         display: flex;
         flex-wrap: wrap;
         align-items: center;
         gap: 24px;
       }

       .profile-text {
         display: flex;
         flex-direction: column;
       }

       /* Ensure the image is fluid within its container */
       .domface {
         height: 128px;
         width: 128px;
         transform: scaleX(-1);
         border-radius: 1rem;
       }

       /* A new class for the more subtle "Home Page" card */
       .home-link-card {
         background-color: transparent;
         border: 1px solid var(--border);
         text-align: center;
         border-radius: 2px;
       }

       /* A specific hover effect for the subtle home card */
       .home-link-card:hover {
         transform: none; /* No scaling effect */
         box-shadow: none; /* No box shadow */
         background-color: var(
           --card-grey
         ); /* Adds a subtle background on hover */
       }

       /* Ensure the image is fluid within its container */
       .domface {
         height: 128px;
         width: 128px;
         transform: scaleX(-1);
         border-radius: 1rem;
       }
     </style>
  </head>
  <body>
    <!-- The main page content section, using the `primary` class from your existing CSS -->
     <section class="primary">

              </div>
            </div>


          <!-- Second grid item: Social media links -->
           <div class="grid-item">

             <div class="social-links">
               <div class="card social-link-card">
                <a

              </div>
              <div class="card social-link-card">
                <a

                  rel="noopener noreferrer"

                <div class="card social-link-card">

                <div class="card social-link-card">
                  <a

                    target="_blank"

                    <i class="fab fa-tiktok"></i>
                    TikTok
                  </a>
                </div>
                <div class="card social-link-card">

                    target="_blank"
                    rel="noopener noreferrer"

                    <i class="fa-solid fa-newspaper"></i>

                  </a>
                </div>
                <div class="card social-link-card">
                  <a
                    href="https://forms.gle/7FPHZTBbxppUKSVr9"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    <i class="fa-solid fa-scroll"></i>

                </div>
                <div class="card social-link-card">
                 <a href="mailto:dom@chuffed.solutions">
                   <i class="fa-solid fa-envelope"></i>

                 </a>
              </div>
              <div class="card social-link-card">
                <a
                  href="https://calendar.app.google/bviNNJ8DT8WMha7Q6"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <i class="fa-solid fa-mug-hot"></i>

              </div>
              <!-- This card is now more subtle with a transparent background -->
              <div class="card social-link-card home-link-card">
                <a href="https://chuffedcoaching.com">
                  <i class="fa-solid fa-house-chimney"></i>
                  Return to home page
                </a>
              </div>
            </div>
          </div>
        </div>
       </div>
     </section>

     <footer>
      <div class="component">

  </body>
</html>
